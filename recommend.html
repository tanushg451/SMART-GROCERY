<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Recommendations - SmartGrocery</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">SmartGrocery<span>AI-Powered Shopping</span></a>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="recommend.html" class="active">Smart Suggest</a></li>
      <li><a href="cart.html">Cart <span class="cart-badge">0</span></a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="#" onclick="openModal('login')">Login</a></li>
    </ul>
  </nav>

  <section class="section" style="margin-top:70px;text-align:center">
    <h2 class="section-title">🧠 Smart Grocery Recommendation</h2>
    <p class="section-subtitle">Tell us about your family and budget — we'll suggest your weekly groceries</p>

    <div class="recommend-form">
      <div class="form-group">
        <label>Family Size</label>
        <select id="familySize">
          <option value="1">1 Member (Single)</option>
          <option value="2">2 Members (Couple)</option>
          <option value="3" selected>3 Members (Small Family)</option>
          <option value="4">4 Members (Family)</option>
          <option value="5">5 Members (Large Family)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Weekly Budget (₹)</label>
        <select id="budget">
          <option value="500">₹500 (Tight)</option>
          <option value="1000">₹1,000 (Economy)</option>
          <option value="1500" selected>₹1,500 (Standard)</option>
          <option value="2000">₹2,000 (Comfortable)</option>
          <option value="3000">₹3,000 (Premium)</option>
          <option value="5000">₹5,000 (Luxury)</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="generateRecommendations()">Generate Smart List ✨</button>
    </div>

    <div id="recResults" style="display:none;max-width:700px;margin:0 auto">
      <h3 style="margin-bottom:1rem;text-align:left">📋 Your Recommended Weekly Groceries</h3>
      <div id="recItems"></div>
      <div class="recommend-total" id="recTotal"></div>
    </div>
  </section>

  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <button class="close-modal" onclick="closeModal()">&times;</button>
      <h2 id="modalTitle">Welcome Back</h2>
      <div id="signupFields" style="display:none"><div class="form-group"><label>Full Name</label><input type="text"></div></div>
      <div class="form-group"><label>Email</label><input type="email"></div>
      <div class="form-group"><label>Password</label><input type="password"></div>
      <button class="btn btn-primary" style="width:100%" onclick="closeModal()">Continue</button>
      <p class="switch-auth" id="switchText"></p>
    </div>
  </div>

  <footer class="footer"><p>&copy; 2025 SmartGrocery</p></footer>
  <script src="js/script.js"></script>
  <script>
    function generateRecommendations() {
      const size = parseInt(document.getElementById('familySize').value);
      const budget = parseInt(document.getElementById('budget').value);
      const { items, total } = getRecommendations(size, budget);
      document.getElementById('recResults').style.display = 'block';
      document.getElementById('recItems').innerHTML = items.map(i => `
        <div class="recommend-item">
          <div><span class="item-name">${i.name}</span> <span class="item-qty">(${i.qty} ${i.unit})</span></div>
          <span class="item-cost">₹${i.cost}</span>
        </div>
      `).join('');
      const savings = budget - total;
      document.getElementById('recTotal').innerHTML = `
        <h3>Estimated Total: ₹${total}</h3>
        <p style="color:var(--text-secondary);margin-top:0.5rem">Budget: ₹${budget} | ${savings >= 0 ? '<span style="color:var(--success)">Savings: ₹' + savings + '</span>' : '<span style="color:var(--danger)">Over budget by ₹' + Math.abs(savings) + '</span>'}</p>
        <p style="color:var(--text-muted);font-size:0.8rem;margin-top:0.5rem">${items.length} items recommended for ${size} member${size > 1 ? 's' : ''}</p>
      `;
    }
  </script>
</body>
</html>
