<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - SmartGrocery</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">SmartGrocery<span>AI-Powered Shopping</span></a>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="recommend.html">Smart Suggest</a></li>
      <li><a href="cart.html">Cart <span class="cart-badge">0</span></a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="#" onclick="openModal('login')">Login</a></li>
    </ul>
  </nav>

  <section class="section" style="margin-top:70px">
    <h2 class="section-title">All Products</h2>
    <p class="section-subtitle">Fresh groceries loaded from our XML catalog</p>
    <div class="filters">
      <input class="search-box" id="searchBox" type="text" placeholder="🔍 Search products...">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="fruits">Fruits</button>
      <button class="filter-btn" data-cat="vegetables">Vegetables</button>
      <button class="filter-btn" data-cat="dairy">Dairy</button>
      <button class="filter-btn" data-cat="packaged">Packaged</button>
    </div>
    <div class="product-grid" id="allProducts"></div>
  </section>

  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <button class="close-modal" onclick="closeModal()">&times;</button>
      <h2 id="modalTitle">Welcome Back</h2>
      <div id="signupFields" style="display:none">
        <div class="form-group"><label>Full Name</label><input type="text" placeholder="Your name"></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com"></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" style="width:100%" onclick="closeModal();showNotification('Logged in!')">Continue</button>
      <p class="switch-auth" id="switchText"></p>
    </div>
  </div>

  <footer class="footer"><p>&copy; 2025 SmartGrocery</p></footer>
  <script src="js/script.js"></script>
  <script>
    let allProducts = [];
    let currentCat = 'all';
    loadProducts(products => {
      allProducts = products;
      render();
    });
    function render() {
      const q = document.getElementById('searchBox').value.toLowerCase();
      let filtered = allProducts;
      if (currentCat !== 'all') filtered = filtered.filter(p => p.category === currentCat);
      if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
      renderProducts(filtered, document.getElementById('allProducts'));
    }
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        render();
      });
    });
    document.getElementById('searchBox').addEventListener('input', render);
  </script>
</body>
</html>
