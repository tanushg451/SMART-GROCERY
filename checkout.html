<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - SmartGrocery</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">SmartGrocery<span>AI-Powered Shopping</span></a>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="recommend.html">Smart Suggest</a></li>
      <li><a href="cart.html">Cart <span class="cart-badge">0</span></a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <section class="section" style="margin-top:70px">
    <div id="checkoutPage">
      <h2 class="section-title">Checkout</h2>
      <p class="section-subtitle">Complete your order</p>
      <div class="checkout-form">
        <form id="checkoutForm" onsubmit="placeOrder(event)">
          <div class="recommend-form" style="max-width:100%">
            <div class="form-group"><label>Full Name</label><input type="text" id="custName" required placeholder="Your full name"></div>
            <div class="form-group"><label>Email</label><input type="email" id="custEmail" required placeholder="you@example.com"></div>
            <div class="form-group"><label>Phone</label><input type="text" id="custPhone" required placeholder="+91 XXXXX XXXXX"></div>
            <div class="form-group"><label>Delivery Address</label><input type="text" id="custAddress" required placeholder="House no, Street, City, PIN"></div>
            <div id="checkoutSummary" style="margin-bottom:1.5rem"></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Place Order ₹<span id="orderTotal">0</span></button>
          </div>
        </form>
      </div>
    </div>

    <div id="successPage" style="display:none;text-align:center;padding:3rem">
      <h2 style="color:var(--accent);font-size:2rem;margin-bottom:1rem">✅ Order Placed Successfully!</h2>
      <p style="color:var(--text-secondary);font-size:1.1rem">Order ID: <strong id="orderId"></strong></p>
      <p style="color:var(--text-muted);margin-top:0.5rem">Thank you for shopping with SmartGrocery!</p>
      <div id="orderDetails" style="max-width:500px;margin:2rem auto;text-align:left;background:var(--bg-card);padding:1.5rem;border-radius:12px;border:1px solid var(--border)"></div>
      <a href="index.html" class="btn btn-primary" style="margin-top:1rem;display:inline-block">Continue Shopping</a>
    </div>
  </section>

  <footer class="footer"><p>&copy; 2025 SmartGrocery</p></footer>
  <script src="js/script.js"></script>
  <script>
    const cart = getCart();
    const total = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);

    if (!cart.length) {
      document.getElementById('checkoutPage').innerHTML = '<div style="text-align:center;padding:3rem"><h2>🛒 Your cart is empty</h2><p style="color:var(--text-secondary);margin:1rem 0">Add some items before checkout</p><a href="products.html" class="btn btn-primary" style="display:inline-block">Browse Products</a></div>';
    }

    const otEl = document.getElementById('orderTotal');
    if (otEl) otEl.textContent = total;

    const summary = document.getElementById('checkoutSummary');
    if (summary && cart.length) {
      summary.innerHTML = '<h4 style="margin-bottom:0.75rem;color:var(--text-primary)">Order Summary</h4>' +
        cart.map(i => '<div style="display:flex;justify-content:space-between;padding:0.4rem 0;color:var(--text-secondary);font-size:0.9rem;border-bottom:1px solid var(--border)"><span>' + i.name + ' × ' + (i.qty||1) + '</span><span>₹' + (i.price*(i.qty||1)) + '</span></div>').join('') +
        '<div style="display:flex;justify-content:space-between;padding:0.75rem 0;color:var(--accent);font-weight:700;font-size:1.1rem"><span>Total</span><span>₹' + total + '</span></div>';
    }

    function placeOrder(e) {
      e.preventDefault();
      const orderId = 'ORD-' + Math.random().toString(36).substr(2, 8).toUpperCase();
      const name = document.getElementById('custName').value;
      const email = document.getElementById('custEmail').value;
      const phone = document.getElementById('custPhone').value;
      const address = document.getElementById('custAddress').value;

      // Save order to localStorage
      const orders = JSON.parse(localStorage.getItem('groceryOrders') || '[]');
      orders.push({ id: orderId, date: new Date().toLocaleString(), name, email, phone, address, items: cart, total });
      localStorage.setItem('groceryOrders', JSON.stringify(orders));

      // Clear cart
      localStorage.removeItem('groceryCart');

      // Show success
      document.getElementById('checkoutPage').style.display = 'none';
      document.getElementById('successPage').style.display = 'block';
      document.getElementById('orderId').textContent = orderId;
      document.getElementById('orderDetails').innerHTML =
        '<p style="margin-bottom:0.5rem"><strong>Name:</strong> ' + name + '</p>' +
        '<p style="margin-bottom:0.5rem"><strong>Email:</strong> ' + email + '</p>' +
        '<p style="margin-bottom:0.5rem"><strong>Phone:</strong> ' + phone + '</p>' +
        '<p style="margin-bottom:0.5rem"><strong>Address:</strong> ' + address + '</p>' +
        '<p style="margin-bottom:0.5rem"><strong>Items:</strong> ' + cart.length + '</p>' +
        '<p><strong>Total:</strong> ₹' + total + '</p>';
      updateCartBadge();
    }
  </script>
</body>
</html>
